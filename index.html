<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Photobooth · Foto Booth Digital</title>
  <!-- Tailwind CSS CDN -->
  <script src="https://cdn.tailwindcss.com"></script>
  <!-- Custom style touch up -->
  <style>
    /* Sembunyikan scrollbar biar lebih rapi */
    ::-webkit-scrollbar {
      display: none;
    }
    body {
      scrollbar-width: none; /* Firefox */
    }
    .gradient-bg {
      background: radial-gradient(circle at 30% 20%, #f0c4ff, #e7b0ff 70%, #d48dee);
    }
    .camera-wrapper {
      position: relative;
      width: 360px;
      height: 360px;
      margin: 0 auto;
      box-shadow: 0 20px 35px -12px rgba(0, 0, 0, 0.3);
      border-radius: 1.25rem;
    }
    /* Video mirror hanya untuk preview, hasil capture tetap normal */
    #videoPreview {
      transform: scaleX(-1);
      width: 100%;
      height: 100%;
      object-fit: cover;
      border-radius: 1.25rem;
      background: #1e1e2f;
      border: 3px solid white;
      box-shadow: 0 0 0 2px #3b82f6;
    }
    .frame-overlay {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: contain;
      pointer-events: none;
    }
    .photo-card {
      position: relative;
      transition: transform 0.2s ease, box-shadow 0.2s ease;
      background: #fef9ff;
      border-radius: 1rem;
      padding: 8px;
      box-shadow: 0 8px 18px rgba(0, 0, 0, 0.1);
    }
    .photo-card:hover {
      transform: translateY(-5px);
      box-shadow: 0 16px 28px rgba(0, 0, 0, 0.15);
    }
    .photo-card img {
      width: 140px;
      height: 140px;
      object-fit: cover;
      border-radius: 0.75rem;
      border: 2px solid #e0d0ff;
      display: block;
    }
    .download-photo-btn {
      position: absolute;
      bottom: 8px;
      left: 50%;
      transform: translateX(-50%);
      background: #3b82f6;
      color: white;
      font-size: 0.7rem;
      font-weight: 600;
      padding: 5px 12px;
      border-radius: 999px;
      cursor: pointer;
      transition: all 0.15s;
      white-space: nowrap;
      box-shadow: 0 2px 6px rgba(0,0,0,0.2);
    }
    .download-photo-btn:hover {
      background: #2563eb;
      transform: translateX(-50%) scale(0.96);
    }
    button:active {
      transform: scale(0.97);
    }
    select, input, button {
      transition: all 0.15s;
    }
    .timer-badge {
      background: #1e293b;
      color: white;
      border-radius: 40px;
    }
    @media (max-width: 520px) {
      .camera-wrapper {
        width: 280px;
        height: 280px;
      }
      .photo-card img {
        width: 110px;
        height: 110px;
      }
    }
  </style>
</head>
<body class="bg-gray-50 font-sans antialiased">

  <div class="max-w-6xl mx-auto px-4 py-8 md:py-10">
    <!-- main card gradient bg -->
    <div class="gradient-bg rounded-3xl shadow-2xl p-6 md:p-10 flex flex-col items-center gap-7 transition-all">

      <h1 class="text-5xl md:text-6xl font-light tracking-wide text-white drop-shadow-md">📸 photobooth</h1>
      <p class="text-white/80 text-sm -mt-2 font-medium">klik capture, pilih filter, dan simpan momenmu</p>

      <!-- CAMERA SECTION -->
      <div class="camera-wrapper">
        <video id="videoPreview" autoplay playsinline muted></video>
        <!-- frame overlay (frame.png) -->
        <img src="frame.png" alt="border frame" class="frame-overlay" id="frameOverlay">
      </div>

      <!-- CONTROLS : FILTER, TIMER, CAPTURE -->
      <div class="flex flex-wrap justify-center gap-3 mt-2">
        <div class="relative">
          <select id="filterSelect" class="bg-white/90 backdrop-blur-sm border border-gray-300 rounded-full px-4 py-2 text-sm font-medium shadow cursor-pointer focus:outline-none focus:ring-2 focus:ring-blue-400">
            <option value="none">✨ Normal</option>
            <option value="grayscale(100%)">🖤 Grayscale</option>
            <option value="sepia(100%)">🟫 Sepia</option>
            <option value="brightness(120%)">☀️ Bright</option>
            <option value="contrast(120%)">⚡ Contrast</option>
            <option value="contrast(110%) saturate(130%) hue-rotate(190deg)">❄️ Cool Cyan</option>
            <option value="saturate(150%) hue-rotate(15deg) brightness(105%)">🍂 Warm Tone</option>
          </select>
        </div>

        <div class="flex items-center gap-1 bg-white/50 rounded-full pl-4 pr-1 backdrop-blur-sm">
          <span class="text-sm font-semibold text-gray-700">⏱️</span>
          <input id="timerInput" type="number" placeholder="detik" value="0" min="0" max="15" step="1"
            class="w-20 border-0 bg-transparent text-center text-sm font-mono font-bold focus:outline-none focus:ring-0 p-2">
          <span class="text-xs text-gray-600 pr-2">dtk</span>
        </div>

        <button id="captureButton"
          class="bg-indigo-600 hover:bg-indigo-700 active:scale-95 text-white font-bold px-7 py-2 rounded-full shadow-lg transition flex items-center gap-2">
          <span>📷</span> Capture
        </button>
      </div>

      <!-- PHOTO GALLERY -->
      <div class="w-full mt-4">
        <div class="flex justify-between items-center mb-3 px-2">
          <h2 class="text-white font-semibold text-lg drop-shadow">📸 Galeri Fotobooth</h2>
          <button id="clearAllBtn" class="text-xs bg-white/30 hover:bg-white/50 rounded-full px-3 py-1 text-gray-800 transition">
            Hapus semua
          </button>
        </div>
        <div id="photoGallery" class="flex flex-wrap justify-center gap-4 max-h-80 overflow-y-auto p-3 rounded-2xl bg-black/20 backdrop-blur-sm">
          <!-- hasil photo akan muncul disini -->
          <p id="emptyGalleryMsg" class="text-white/70 text-sm italic py-6">Belum ada foto, klik capture untuk mulai!</p>
        </div>
      </div>
    </div>
    <p class="text-center text-xs text-gray-500 mt-5">✨ Hasil foto TIDAK mirror, sesuai tampilan asli kamera + frame otomatis ✨</p>
  </div>

  <script>
    (function() {
      // ---------- DOM Elements ----------
      const videoElement = document.getElementById('videoPreview');
      const captureBtn = document.getElementById('captureButton');
      const filterSelect = document.getElementById('filterSelect');
      const timerInput = document.getElementById('timerInput');
      const photoGallery = document.getElementById('photoGallery');
      const emptyMsg = document.getElementById('emptyGalleryMsg');
      const clearAllBtn = document.getElementById('clearAllBtn');

      // status & helper
      let streamActive = null;
      let isCapturing = false;   // mencegah multi capture saat timer berjalan

      // ---------- 1. INIT KAMERA (mirror untuk preview) ----------
      async function initCamera() {
        try {
          if (streamActive) {
            // matikan track lama jika ada
            streamActive.getTracks().forEach(track => track.stop());
          }
          const stream = await navigator.mediaDevices.getUserMedia({ video: { width: { ideal: 1280 }, height: { ideal: 1280 } } });
          videoElement.srcObject = stream;
          streamActive = stream;
          // video play sudah otomatis karena autoplay
        } catch (err) {
          console.error("Gagal akses kamera:", err);
          alert("Tidak dapat mengakses kamera. Pastikan izin diberikan.");
          captureBtn.disabled = true;
        }
      }

      // ---------- 2. Terapkan filter ke video preview (live mirror effect) ----------
      function applyFilterToPreview() {
        const selectedFilter = filterSelect.value;
        videoElement.style.filter = selectedFilter;
      }

      filterSelect.addEventListener('change', () => {
        applyFilterToPreview();
      });

      // ---------- 3. Fungsi capture (final image dengan frame dan tanpa mirror) ----------
      async function performCapture() {
        // Cek apakah video siap & stream aktif
        if (!videoElement.videoWidth || !videoElement.videoHeight) {
          alert("Kamera belum siap, tunggu sebentar.");
          return false;
        }

        // Ukuran final foto persegi 1080x1080 (HD square)
        const targetSize = 1080;
        const canvas = document.createElement('canvas');
        canvas.width = targetSize;
        canvas.height = targetSize;
        const ctx = canvas.getContext('2d');

        // Ambil dimensi asli video (bisa landscape/portrait)
        const vidWidth = videoElement.videoWidth;
        const vidHeight = videoElement.videoHeight;
        
        // Hitung crop center agar square & tidak distort, TAPI kita tetap gambar full aspek rasio agar wajah proporsional
        // lalu potong jadi persegi (center crop) sehingga hasil tetap bagus & tidak mirror.
        // Karena preview di-mirror tapi source video asli tidak mirror, drawImage dari videoElement yang sedang dimirror secara visual? 
        // Hati-hati: videoElement.style.transform = scaleX(-1) hanya mempengaruhi tampilan CSS, 
        // namun drawImage mengambil frame video asli (non-mirrored) langsung dari stream. Jadi aman.
        // Untuk membuat hasil potret tidak terbalik, kita drawImage normal dari stream asli (karena videoElement punya Orientasi asli kamera)
        // Tapi pastikan CSS transform tidak mengubah data pixel. Data tetap original. 
        // Maka hasil capture akan seperti cermin? tidak akan, karena kita menggunakan asli video frame tanpa mirroring.
        // Tapi user melihat preview mirror, hasil akhir menjadi normal (seperti foto biasanya). Bagus!
        
        // Hitung source cropping area agar square (1:1)
        let sx = 0, sy = 0, sWidth = vidWidth, sHeight = vidHeight;
        if (vidWidth > vidHeight) {
          // landscape: ambil bagian tengah vertikal
          sWidth = vidHeight;
          sx = (vidWidth - vidHeight) / 2;
        } else if (vidHeight > vidWidth) {
          // portrait: ambil bagian tengah horizontal
          sHeight = vidWidth;
          sy = (vidHeight - vidWidth) / 2;
        }
        
        // 1. Gambar video (tidak mirror) dengan crop center agar square
        ctx.filter = filterSelect.value;   // terapkan filter sesuai pilihan user pada hasil foto
        ctx.drawImage(videoElement, sx, sy, sWidth, sHeight, 0, 0, targetSize, targetSize);
        
        // 2. Overlay frame (frame.png) harus di-load terlebih dahulu
        // Karena frame gambar eksternal, kita lakukan async image loading. 
        // Untuk menghindari race condition, kita buat Promise load frame.
        const frameUrl = "frame.png";
        const frameImage = await loadImage(frameUrl);
        if (frameImage) {
          ctx.drawImage(frameImage, 0, 0, targetSize, targetSize);
        } else {
          console.warn("Frame tidak ditemukan, lanjut tanpa frame overlay.");
        }
        
        // 3. Hasilkan dataURL gambar final
        const finalImageURL = canvas.toDataURL('image/png');
        
        // 4. Buat elemen galeri
        addPhotoToGallery(finalImageURL);
        return true;
      }

      // Helper: load gambar dengan Promise (agar frame selalu tergambar)
      function loadImage(src) {
        return new Promise((resolve) => {
          const img = new Image();
          img.crossOrigin = "Anonymous";
          img.onload = () => resolve(img);
          img.onerror = () => {
            console.warn(`Gagal load frame: ${src}`);
            resolve(null);
          };
          img.src = src;
        });
      }

      // ---------- 4. Tambah foto ke galeri (dengan tombol download) ----------
      function addPhotoToGallery(imageDataUrl) {
        // Hilangkan pesan empty jika ada
        if (emptyMsg) emptyMsg.style.display = 'none';
        
        // Buat card foto
        const cardDiv = document.createElement('div');
        cardDiv.className = 'photo-card relative';
        
        const imgElement = document.createElement('img');
        imgElement.src = imageDataUrl;
        imgElement.alt = 'photobooth snapshot';
        imgElement.loading = 'lazy';
        
        const downloadButton = document.createElement('button');
        downloadButton.textContent = '💾 Download';
        downloadButton.className = 'download-photo-btn';
        downloadButton.setAttribute('aria-label', 'download foto');
        downloadButton.onclick = (e) => {
          e.stopPropagation();
          // download image
          const a = document.createElement('a');
          a.href = imageDataUrl;
          a.download = `photobooth_${new Date().toISOString().slice(0,19).replace(/:/g, '-')}.png`;
          document.body.appendChild(a);
          a.click();
          document.body.removeChild(a);
        };
        
        cardDiv.appendChild(imgElement);
        cardDiv.appendChild(downloadButton);
        photoGallery.appendChild(cardDiv);
        
        // Scroll ke foto terbaru
        cardDiv.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
      }
      
      // ---------- 5. Hapus semua foto ----------
      function clearAllPhotos() {
        // Hapus semua child di photoGallery kecuali pesan kosong
        while (photoGallery.firstChild) {
          photoGallery.removeChild(photoGallery.firstChild);
        }
        // Tampilkan kembali pesan empty jika dibutuhkan
        if (emptyMsg) {
          emptyMsg.style.display = 'block';
          photoGallery.appendChild(emptyMsg);
        } else {
          const newEmptyMsg = document.createElement('p');
          newEmptyMsg.id = 'emptyGalleryMsg';
          newEmptyMsg.className = 'text-white/70 text-sm italic py-6';
          newEmptyMsg.innerText = 'Belum ada foto, klik capture untuk mulai!';
          photoGallery.appendChild(newEmptyMsg);
          // update referensi
          window.emptyMsgRef = newEmptyMsg;
        }
      }
      
      // ---------- 6. Capture dengan timer & disable double action ----------
      let timerInterval = null;
      
      function resetCaptureButton() {
        if (timerInterval) {
          clearInterval(timerInterval);
          timerInterval = null;
        }
        captureBtn.disabled = false;
        captureBtn.innerHTML = '<span>📷</span> Capture';
        isCapturing = false;
      }
      
      function startCaptureWithTimer(seconds) {
        if (isCapturing) {
          // avoid multiple timers
          return;
        }
        isCapturing = true;
        let remaining = seconds;
        captureBtn.disabled = true;
        captureBtn.innerHTML = `<span>⏳</span> ${remaining} detik`;
        
        timerInterval = setInterval(() => {
          remaining--;
          if (remaining >= 0) {
            captureBtn.innerHTML = `<span>⏳</span> ${remaining} detik`;
          }
          if (remaining < 0) {
            clearInterval(timerInterval);
            timerInterval = null;
            // Ambil foto
            performCapture().finally(() => {
              captureBtn.disabled = false;
              captureBtn.innerHTML = '<span>📷</span> Capture';
              isCapturing = false;
            }).catch(err => {
              console.error("Gagal capture:", err);
              alert("Terjadi kesalahan saat mengambil foto");
              captureBtn.disabled = false;
              captureBtn.innerHTML = '<span>📷</span> Capture';
              isCapturing = false;
            });
          }
        }, 1000);
      }
      
      // Handler utama tombol capture
      function onCaptureClick() {
        if (isCapturing) {
          // sedang proses timer/capture, tidak boleh tumpuk
          return;
        }
        
        let timerValue = parseInt(timerInput.value, 10);
        if (isNaN(timerValue)) timerValue = 0;
        timerValue = Math.min(Math.max(timerValue, 0), 20); // batas maks 20dtk
        
        if (timerValue > 0) {
          startCaptureWithTimer(timerValue);
        } else {
          // langsung capture, disable button sebentar biar ga dobel
          isCapturing = true;
          captureBtn.disabled = true;
          captureBtn.innerHTML = '<span>📸</span> Proses...';
          performCapture().finally(() => {
            captureBtn.disabled = false;
            captureBtn.innerHTML = '<span>📷</span> Capture';
            isCapturing = false;
          }).catch((err) => {
            console.error(err);
            alert("Gagal mengambil foto, cek kamera atau frame.");
            captureBtn.disabled = false;
            captureBtn.innerHTML = '<span>📷</span> Capture';
            isCapturing = false;
          });
        }
      }
      
      // ---------- 7. Pastikan frame.png tersedia, fallback ringan ----------
      // Cek apakah frame.png bisa diakses? (tidak merusak UX, jika gagal akan tetap tanpa frame)
      function preloadFrameImage() {
        const testImg = new Image();
        testImg.onload = () => console.log("✅ frame.png siap digunakan");
        testImg.onerror = () => console.warn("⚠️ frame.png tidak ditemukan, foto tetap diambil tanpa border. pastikan file frame.png ada di direktori yang sama.");
        testImg.src = "frame.png";
      }
      
      // ---------- 8. Bersihkan event & cleanup jika halaman ditutup (opsional) ----------
      window.addEventListener('beforeunload', () => {
        if (streamActive) {
          streamActive.getTracks().forEach(track => track.stop());
        }
        if (timerInterval) clearInterval(timerInterval);
      });
      
      // ---------- 9. Reset empty gallery message helper ----------
      function updateEmptyMessage() {
        const existingMsg = document.getElementById('emptyGalleryMsg');
        const hasPhotos = photoGallery.children.length > 0 && !(photoGallery.children.length === 1 && photoGallery.children[0].id === 'emptyGalleryMsg');
        if (!hasPhotos) {
          if (!existingMsg) {
            const newMsg = document.createElement('p');
            newMsg.id = 'emptyGalleryMsg';
            newMsg.className = 'text-white/70 text-sm italic py-6';
            newMsg.innerText = 'Belum ada foto, klik capture untuk mulai!';
            photoGallery.appendChild(newMsg);
          } else {
            existingMsg.style.display = 'block';
          }
        } else {
          if (existingMsg) existingMsg.style.display = 'none';
        }
      }
      
      // override clearAllBtn
      clearAllBtn.addEventListener('click', () => {
        clearAllPhotos();
        updateEmptyMessage();
      });
      
      // Mutation observer untuk menjaga empty message pada galeri
      const observer = new MutationObserver(() => {
        const hasPhotos = Array.from(photoGallery.children).some(child => child.classList && child.classList.contains('photo-card'));
        const emptyMsgElem = document.getElementById('emptyGalleryMsg');
        if (!hasPhotos) {
          if (!emptyMsgElem) {
            const newEmpty = document.createElement('p');
            newEmpty.id = 'emptyGalleryMsg';
            newEmpty.className = 'text-white/70 text-sm italic py-6';
            newEmpty.innerText = 'Belum ada foto, klik capture untuk mulai!';
            photoGallery.appendChild(newEmpty);
          } else {
            emptyMsgElem.style.display = 'block';
          }
        } else {
          if (emptyMsgElem) emptyMsgElem.style.display = 'none';
        }
      });
      observer.observe(photoGallery, { childList: true, subtree: false });
      
      // ---------- 10. Init camera dan event listener ----------
      initCamera();
      preloadFrameImage();
      applyFilterToPreview(); // set default filter preview
      
      captureBtn.addEventListener('click', onCaptureClick);
      
      // jika frame gagal load, tidak masalah; kita tetap hasilkan foto pakai frame kosong.
      // pastikan saat gallery dikosongkan pesan muncul
      updateEmptyMessage();
      
      // bonus: saat video sudah ready, pastikan filter diterapkan ulang jika diperlukan
      videoElement.addEventListener('loadeddata', () => {
        applyFilterToPreview();
      });
      
      // optional: jika ingin hapus semua foto dan reset tampilan
      console.log("✨ Photobooth siap pakai! Pastikan file 'frame.png' tersedia di folder yang sama.");
    })();
  </script>
</body>
</html>
